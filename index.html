
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,sans-serif);color:var(--color-text-primary);background:transparent;direction:rtl}
.hub-tabs{display:flex;gap:0;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:1rem}
.hub-tab{padding:7px 14px;border:none;background:transparent;color:var(--color-text-secondary);font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:inherit}
.hub-tab.active{color:#0C447C;border-bottom-color:#378ADD;font-weight:500}
.sim-panel{display:none}.sim-panel.active{display:block}

.par-layout{display:grid;grid-template-columns:1fr 220px;gap:10px;align-items:start}
@media(max-width:520px){.par-layout{grid-template-columns:1fr}}
.graph-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;overflow:hidden}
canvas#gc{width:100%;display:block}

.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:10px 12px;margin-bottom:8px}
.clabel{font-size:10px;color:var(--color-text-tertiary);margin-bottom:7px;font-weight:500;letter-spacing:.05em;text-transform:uppercase}

/* formula display */
.formula-wrap{padding:8px 10px 6px;border-bottom:0.5px solid var(--color-border-tertiary)}
.formula-general{text-align:center;font-size:13px;color:var(--color-text-tertiary);margin-bottom:6px;letter-spacing:.2px}
.formula-specific{display:flex;justify-content:center;align-items:flex-start;gap:2px;font-size:15px;font-weight:500}
.fs-part{display:flex;flex-direction:column;align-items:center;gap:2px}
.fs-sym{font-size:15px;font-weight:500;color:var(--color-text-primary);line-height:1}
.fs-coef{font-size:16px;font-weight:500;color:#185FA5;line-height:1;min-height:20px;min-width:16px;text-align:center}
.fs-space{width:4px}

/* sliders */
.par-group{margin-bottom:10px}
.par-group-label{font-size:11px;color:var(--color-text-tertiary);margin-bottom:5px;font-weight:500}
.slider-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.slider-row label{font-size:13px;font-weight:500;min-width:12px;color:var(--color-text-primary)}
.slider-row input[type=range]{flex:1;min-width:0}
.slider-val-inp{width:44px;height:26px;padding:0 4px;border:0.5px solid var(--color-border-secondary);border-radius:5px;font-size:12px;font-weight:500;color:#185FA5;background:var(--color-background-primary);font-family:inherit;text-align:center}
.slider-val-inp.par2{color:#993C1D}

/* toggles */
.toggle-section{margin-bottom:4px}
.toggle-group-label{font-size:10px;color:var(--color-text-tertiary);margin-bottom:4px;font-weight:500;letter-spacing:.05em;text-transform:uppercase}
.tog-item{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--color-text-secondary);padding:3px 0}
.tog-label{display:flex;align-items:center;gap:6px}
.tog-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tog{position:relative;width:28px;height:16px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-track{position:absolute;inset:0;background:var(--color-border-secondary);border-radius:99px;transition:background .2s;cursor:pointer}
.tog input:checked+.tog-track{background:#185FA5}
.tog-thumb{position:absolute;top:2px;left:2px;width:12px;height:12px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none}
.tog input:checked~.tog-thumb{transform:translateX(12px)}

/* info grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.info-item{background:var(--color-background-secondary);border-radius:7px;padding:6px 8px}
.info-lbl{font-size:10px;color:var(--color-text-tertiary);margin-bottom:1px}
.info-val{font-size:12px;font-weight:500;color:var(--color-text-primary)}

/* par2 enable row */
.par2-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.par2-title{font-size:12px;color:var(--color-text-secondary);font-weight:500}

.legend-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;padding:0 2px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-secondary)}
.leg-line{width:14px;height:2.5px;border-radius:2px;flex-shrink:0}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* eq sim styles (kept compact) */
.progress-bar-wrap{margin-bottom:10px}
.progress-top{display:flex;justify-content:space-between;margin-bottom:5px}
.progress-label{font-size:12px;color:var(--color-text-secondary)}
.progress-count{font-size:12px;font-weight:500;color:#0C447C}
.progress-track{height:6px;background:var(--color-background-secondary);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:#378ADD;border-radius:99px;transition:width .5s}
.progress-dots{display:flex;gap:5px;margin-top:5px}
.prog-dot{width:10px;height:10px;border-radius:50%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);cursor:pointer;transition:all .3s}
.prog-dot.curr{background:#378ADD;border-color:#185FA5}
.prog-dot.done{background:#3B6D11;border-color:#27500A}
.eq-layout{display:grid;grid-template-columns:1fr 210px;gap:10px;align-items:start}
@media(max-width:500px){.eq-layout{grid-template-columns:1fr}}
.scale-area{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:10px 10px 4px}
canvas#sc{width:100%;display:block}
.eq-display{text-align:center;font-size:20px;font-weight:500;margin:5px 0 2px;min-height:28px}
.eq-orig{text-align:center;font-size:12px;color:var(--color-text-tertiary);margin-bottom:2px;min-height:16px}
.eq-guide{text-align:center;font-size:12px;color:var(--color-text-secondary);margin-bottom:3px;min-height:15px}
.anim-bar{text-align:center;font-size:11px;color:var(--color-text-secondary);min-height:15px;margin:2px 0}
.ops-2col{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px}
.op-btn{padding:6px 4px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;cursor:pointer;text-align:center;font-family:inherit;font-weight:500;transition:background .1s}
.op-btn:hover{background:var(--color-background-secondary)}
.op-btn.sel{background:#E6F1FB;border-color:#378ADD;color:#0C447C}
.x-coef-row{display:flex;gap:5px;align-items:center;margin-bottom:5px}
.x-coef-label{font-size:11px;color:var(--color-text-tertiary)}
.x-coef-inp{width:50px;height:28px;padding:0 6px;border:0.5px solid var(--color-border-secondary);border-radius:6px;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);font-family:inherit;text-align:center}
.x-row{display:flex;gap:5px}
.x-btn{flex:1;height:30px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .12s}
.x-btn:hover{background:var(--color-background-secondary)}
.x-btn.on{background:#EAF3DE;border-color:#3B6D11;color:#27500A}
.divider{height:0.5px;background:var(--color-border-tertiary);margin:8px 0}
.exec-row{display:flex;gap:6px;align-items:center;margin-top:8px}
.num-inp{width:52px;height:36px;padding:0 6px;border:0.5px solid var(--color-border-secondary);border-radius:6px;font-size:14px;background:var(--color-background-primary);color:var(--color-text-primary);font-family:inherit;text-align:center}
.preview-box{flex:1;height:36px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500}
.exec-btn{height:36px;padding:0 14px;border-radius:8px;border:none;background:#185FA5;color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s}
.exec-btn:hover{background:#0C447C}
.exec-btn:disabled{background:var(--color-border-secondary);cursor:not-allowed}
.err-msg{font-size:11px;color:var(--color-text-danger);min-height:13px;margin-top:3px}
.log-card{max-height:130px;overflow-y:auto}
.log-entry{font-size:12px;padding:3px 0;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;gap:8px}
.log-entry:last-child{border-bottom:none}
.log-op{color:var(--color-text-secondary);min-width:38px;font-size:11px;flex-shrink:0}
.log-eq{color:var(--color-text-primary);font-weight:500}
.solved-banner{padding:8px;border-radius:8px;background:#EAF3DE;color:#27500A;border:0.5px solid #3B6D11;text-align:center;font-size:14px;font-weight:500;margin-bottom:8px;display:none}
.solved-banner.show{display:block}
.nav-row{display:flex;gap:5px;flex-wrap:wrap}
.sm-btn{height:30px;padding:0 10px;border-radius:6px;border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);font-size:12px;cursor:pointer;font-family:inherit}
.sm-btn:hover{background:var(--color-background-secondary)}
.eq-row2{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;border:0.5px solid var(--color-border-tertiary);margin-bottom:4px;font-size:13px;background:var(--color-background-primary);cursor:pointer;transition:background .1s}
.eq-row2:hover{background:var(--color-background-secondary)}
.eq-row2.curr{background:#E6F1FB;border-color:#378ADD}
.eq-row2.done2{background:#EAF3DE;border-color:#3B6D11}
.eq-num2{font-size:11px;color:var(--color-text-tertiary);min-width:16px}
.eq-txt2{flex:1;font-weight:500}
.dot-b{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-c{background:#378ADD}.dot-d{background:#3B6D11}.dot-t{background:var(--color-border-secondary)}
.add-eq-row{display:flex;gap:5px;margin-top:8px}
.add-eq-inp{flex:1;height:30px;padding:0 8px;border:0.5px solid var(--color-border-secondary);border-radius:6px;font-size:12px;background:var(--color-background-primary);color:var(--color-text-primary);font-family:inherit}
.coming{display:flex;align-items:center;justify-content:center;height:160px;color:var(--color-text-tertiary);font-size:14px;flex-direction:column;gap:8px}
</style>

<script>
// ===================================================================
// PARABOLA SIM
// ===================================================================
const gc=document.getElementById('gc');
const gctx=gc.getContext('2d');
let gdpr=1,gcw=400,gch=320;

function gRz(){
  gdpr=window.devicePixelRatio||1;
  gcw=Math.max(200,gc.parentElement.clientWidth);
  gc.width=gcw*gdpr; gc.height=gch*gdpr;
  gctx.scale(gdpr,gdpr);
}

const PAR1_COL='#185FA5';
const PAR2_COL='#993C1D';
const PAR1_PT={vertex:'#D85A30',yint:'#3B6D11',xint:'#854F0B',axis:'rgba(24,95,165,.45)'};
const PAR2_PT={vertex:'#D84726',yint:'#639922',xint:'#BA7517',axis:'rgba(153,60,29,.45)'};

function getP(n,k){
  const v=parseFloat(document.getElementById(`p${n}${k}-in`).value);
  return isNaN(v)?0:v;
}
function fx(a,b,c,x){return a*x*x+b*x+c;}

function fmtN(v){
  const r=Math.round(v*100)/100;
  return r%1===0?String(r):r.toFixed(2).replace(/\.?0+$/,'');
}

function fmtCoef(v,isA){
  // for display in formula: skip 1/-1 for non-c terms
  if(isA){if(v===1)return'';if(v===-1)return'-';}
  return fmtN(v);
}

function buildFormulaHTML(n){
  const a=getP(n,'a'),b=getP(n,'b'),c=getP(n,'c');
  const col=n===1?PAR1_COL:PAR2_COL;
  const cst=`color:${col};font-size:17px;font-weight:500;line-height:1`;

  function coefSpan(val,isA){
    return `<span style="${cst}">${isA?fmtCoef(val,true):fmtN(val)}</span>`;
  }
  function under(label){return `<span style="font-size:10px;color:var(--color-text-tertiary);line-height:1">${label}</span>`;}

  let parts=[];
  // y =
  parts.push(`<span style="font-size:15px;font-weight:500;color:var(--color-text-primary);align-self:center">y =&nbsp;</span>`);

  // a·x²
  if(a!==0){
    const aStr=fmtCoef(a,true);
    parts.push(`<div class="fs-part">${coefSpan(a,true)}<span style="font-size:10px;color:var(--color-text-tertiary)">a</span></div>`);
    if(aStr!==''&&aStr!=='-') parts.push(`<span style="align-self:center;font-size:15px;color:var(--color-text-secondary)">·</span>`);
    parts.push(`<span style="align-self:center;font-size:15px;font-weight:500">x²</span>`);
  }

  // + b·x
  if(b!==0){
    const sign=b>0?(a!==0?' + ':''): (a!==0?' − ':'−');
    const absB=Math.abs(b);
    parts.push(`<span style="align-self:center;font-size:15px;color:var(--color-text-secondary);white-space:pre">${sign}</span>`);
    parts.push(`<div class="fs-part">${coefSpan(absB,false)}<span style="font-size:10px;color:var(--color-text-tertiary)">b</span></div>`);
    if(absB!==1) parts.push(`<span style="align-self:center;font-size:15px;font-weight:500">·</span>`);
    parts.push(`<span style="align-self:center;font-size:15px;font-weight:500">x</span>`);
  }

  // + c
  if(c!==0||(a===0&&b===0)){
    const sign=c>0&&(a!==0||b!==0)?' + ':(c<0&&(a!==0||b!==0))?' − ':'';
    const absC=(a!==0||b!==0)?Math.abs(c):c;
    parts.push(`<span style="align-self:center;font-size:15px;color:var(--color-text-secondary);white-space:pre">${sign}</span>`);
    parts.push(`<div class="fs-part"><span style="${cst}">${fmtN(absC)}</span><span style="font-size:10px;color:var(--color-text-tertiary)">c</span></div>`);
  }

  return parts.join('');
}

function calcSpecial(a,b,c){
  const vx=a!==0?-b/(2*a):null;
  const vy=vx!==null?fx(a,b,c,vx):null;
  const disc=a!==0?b*b-4*a*c:null;
  let xInts=[];
  if(a!==0&&disc!==null){
    if(Math.abs(disc)<1e-9) xInts=[{x:-b/(2*a)}];
    else if(disc>0){const sq=Math.sqrt(disc);xInts=[{x:(-b-sq)/(2*a)},{x:(-b+sq)/(2*a)}];}
  } else if(a===0&&b!==0) xInts=[{x:-c/b}];
  return{vx,vy,xInts,disc,yInt:c};
}

function getBestStep(approx){
  const nice=[0.25,0.5,1,2,2.5,5,10,20,25,50];
  return nice.find(n=>n>=approx)||50;
}

function drawParCurve(a,b,c,col,xMin,xMax,toSX,toSY,padT,H){
  if(a===0&&b===0){
    // horizontal line
    const sy=toSY(c);
    if(sy>=padT-2&&sy<=padT+H+2){
      gctx.beginPath();gctx.strokeStyle=col;gctx.lineWidth=2.2;
      gctx.moveTo(toSX(xMin),sy);gctx.lineTo(toSX(xMax),sy);gctx.stroke();
    }
    return;
  }
  gctx.beginPath();gctx.strokeStyle=col;gctx.lineWidth=2.2;
  let first=true;
  for(let i=0;i<=300;i++){
    const wx=xMin+(xMax-xMin)*i/300;
    const wy=fx(a,b,c,wx);
    const sx=toSX(wx),sy=toSY(wy);
    if(sy<padT-4||sy>padT+H+4){first=true;continue;}
    if(first){gctx.moveTo(sx,sy);first=false;}else gctx.lineTo(sx,sy);
  }
  gctx.stroke();
}

function drawSpecialPts(n,sp,pts,toSX,toSY,padT,padL,H,W){

    dot(sp.vx,sp.vy,col.vertex,6,'('+fmtN(sp.vx)+','+fmtN(sp.vy)+')',sp.vy<0?'b':'t');
}

function drawPar(){
  gRz();
  gctx.clearRect(0,0,gcw,gch);
  const dk=window.matchMedia('(prefers-color-scheme:dark)').matches;

  const a1=getP(1,'a'),b1=getP(1,'b'),c1=getP(1,'c');
  const par2on=document.getElementById('tog-p2').checked;
  const a2=par2on?getP(2,'a'):0,b2=par2on?getP(2,'b'):0,c2p=par2on?getP(2,'c'):0;

  // compute world range
  const sp1=calcSpecial(a1,b1,c1);
  const cx1=sp1.vx||0;
  let xMin=cx1-8,xMax=cx1+8;
  if(par2on){const sp2t=calcSpecial(a2,b2,c2p);const cx2=sp2t.vx||0;xMin=Math.min(cx1,cx2)-8;xMax=Math.max(cx1,cx2)+8;}

  const ySamples=[];
  for(let i=0;i<=80;i++){const wx=xMin+(xMax-xMin)*i/80;ySamples.push(fx(a1,b1,c1,wx));if(par2on)ySamples.push(fx(a2,b2,c2p,wx));}
  let yMin=Math.min(...ySamples),yMax=Math.max(...ySamples);
  if(Math.abs(yMax-yMin)<1){yMin-=4;yMax+=4;}
  const yPad=(yMax-yMin)*0.18;yMin-=yPad;yMax+=yPad;

  const padL=40,padR=14,padT=18,padB=26;
  const W=gcw-padL-padR,H=gch-padT-padB;
  const toSX=wx=>padL+(wx-xMin)/(xMax-xMin)*W;
  const toSY=wy=>padT+(yMax-wy)/(yMax-yMin)*H;

  const axCol=dk?'rgba(255,255,255,.17)':'rgba(0,0,0,.14)';
  const gridCol=dk?'rgba(255,255,255,.07)':'rgba(0,0,0,.055)';
  const txtCol=dk?'#b0ae a6':'#555552';

  // grid
  gctx.strokeStyle=gridCol;gctx.lineWidth=0.5;
  const xStep=getBestStep((xMax-xMin)/6);
  let xg=Math.ceil(xMin/xStep)*xStep;
  while(xg<=xMax+1e-9){const sx=toSX(xg);gctx.beginPath();gctx.moveTo(sx,padT);gctx.lineTo(sx,padT+H);gctx.stroke();xg+=xStep;}
  const yStep=getBestStep((yMax-yMin)/6);
  let yg=Math.ceil(yMin/yStep)*yStep;
  while(yg<=yMax+1e-9){const sy=toSY(yg);gctx.beginPath();gctx.moveTo(padL,sy);gctx.lineTo(padL+W,sy);gctx.stroke();yg+=yStep;}

  // axes
  gctx.strokeStyle=axCol;gctx.lineWidth=1.2;
  const ox=toSX(0),oy=toSY(0);
  if(ox>=padL&&ox<=padL+W){gctx.beginPath();gctx.moveTo(ox,padT);gctx.lineTo(ox,padT+H);gctx.stroke();}
  if(oy>=padT&&oy<=padT+H){gctx.beginPath();gctx.moveTo(padL,oy);gctx.lineTo(padL+W,oy);gctx.stroke();}

  // tick labels
  const tc=dk?'rgba(200,198,190,.6)':'rgba(60,60,58,.6)';
  gctx.fillStyle=tc;gctx.font=`9px var(--font-sans,sans-serif)`;
  let xg2=Math.ceil(xMin/xStep)*xStep;
  while(xg2<=xMax+1e-9){if(Math.abs(xg2)>0.01){const sx=toSX(xg2),labelY=Math.min(padT+H+3,Math.max(oy+3,padT+H));gctx.textAlign='center';gctx.textBaseline='top';gctx.fillText(fmtN(xg2),sx,labelY);}xg2+=xStep;}
  let yg2=Math.ceil(yMin/yStep)*yStep;
  while(yg2<=yMax+1e-9){if(Math.abs(yg2)>0.01){const sy=toSY(yg2),labelX=Math.min(ox-3,padL-2);gctx.textAlign='right';gctx.textBaseline='middle';gctx.fillText(fmtN(yg2),labelX,sy);}yg2+=yStep;}

  // axis arrows + labels
  gctx.strokeStyle=axCol;gctx.lineWidth=1;
  if(oy>=padT&&oy<=padT+H){gctx.beginPath();gctx.moveTo(padL+W-2,oy-4);gctx.lineTo(padL+W+5,oy);gctx.lineTo(padL+W-2,oy+4);gctx.stroke();gctx.fillStyle=tc;gctx.font=`11px var(--font-sans,sans-serif)`;gctx.textAlign='left';gctx.textBaseline='middle';gctx.fillText('x',padL+W+7,oy);}
  if(ox>=padL&&ox<=padL+W){gctx.beginPath();gctx.moveTo(ox-4,padT+2);gctx.lineTo(ox,padT-5);gctx.lineTo(ox+4,padT+2);gctx.stroke();gctx.fillStyle=tc;gctx.font=`11px var(--font-sans,sans-serif)`;gctx.textAlign='center';gctx.textBaseline='bottom';gctx.fillText('y',ox,padT-6);}
  if(ox>=padL&&ox<=padL+W&&oy>=padT&&oy<=padT+H){gctx.fillStyle=tc;gctx.font=`9px var(--font-sans,sans-serif)`;gctx.textAlign='right';gctx.textBaseline='top';gctx.fillText('0',ox-2,oy+2);}

  // curves
  drawParCurve(a1,b1,c1,PAR1_COL,xMin,xMax,toSX,toSY,padT,H);
  if(par2on) drawParCurve(a2,b2,c2p,PAR2_COL,xMin,xMax,toSX,toSY,padT,H);

  // special points
  drawSpecialPts(1,sp1,null,toSX,toSY,padT,padL,H,W);
  if(par2on){const sp2=calcSpecial(a2,b2,c2p);updInfo(2,sp2);drawSpecialPts(2,sp2,null,toSX,toSY,padT,padL,H,W);}

  updInfo(1,sp1);
  updFormulaDisplay();
  updLegend();
}

  const bar=document.getElementById('anim-bar');
  const midSt={lx:r3(effOp==='add'?beforeSt.lx+xc:effOp==='sub'?beforeSt.lx-xc:effOp==='mul'?beforeSt.lx*nc:beforeSt.lx/nc),ln:r3(effOp==='add'?beforeSt.ln+nc:effOp==='sub'?beforeSt.ln-nc:effOp==='mul'?beforeSt.ln*nc:beforeSt.ln/nc),rx:beforeSt.rx,rn:beforeSt.rn};
  const isAdd=(effOp==='add')||(effOp==='mul'&&nc>0)||(effOp==='div'&&nc>0);
  const exInfo={label:lbl,isAdd};
  const verb=effOp==='add'?'מוסיפים':effOp==='sub'?'מחסירים':effOp==='mul'?'מכפילים':'מחלקים';
  bar.textContent=`${verb} ${lbl} לצד שמאל`;
  let a=0;const t1=setInterval(()=>{a=Math.min(1,a+0.1);drawScale(midSt,{...exInfo,alpha:a},null);if(a>=1)clearInterval(t1);},40);
  setTimeout(()=>{clearInterval(t1);bar.textContent=`${verb} ${lbl} גם לצד ימין`;let a2=0;const t2=setInterval(()=>{a2=Math.min(1,a2+0.1);drawScale(midSt,null,{...exInfo,alpha:a2});if(a2>=1)clearInterval(t2);},40);setTimeout(()=>{clearInterval(t2);bar.textContent='';drawScale(afterSt);onDone();},900);},900);
}
function selOp(o){op=o;xMode=null;document.querySelectorAll('.op-btn').forEach(b=>b.classList.remove('sel'));document.getElementById('op-'+o).classList.add('sel');document.getElementById('xadd-btn').classList.remove('on');document.getElementById('xsub-btn').classList.remove('on');updPreview();}
function selXOp(m){xMode=xMode===m?null:m;if(xMode){op='add';document.querySelectorAll('.op-btn').forEach(b=>b.classList.remove('sel'));}document.getElementById('xadd-btn').classList.toggle('on',xMode==='add');document.getElementById('xsub-btn').classList.toggle('on',xMode==='sub');updPreview();}
function updPreview(){const num=parseFloat(document.getElementById('num-inp').value)||0;const coef=parseFloat(document.getElementById('x-coef').value)||1;const sym={add:'+',sub:'−',mul:'·',div:'÷'}[op];let txt;if(xMode==='add')txt=coef===1?'+x':'+'+coef+'x';else if(xMode==='sub')txt=coef===1?'−x':'−'+coef+'x';else txt=sym+num;document.getElementById('preview-box').textContent=txt;}
function doApply(){if(busy)return;const err=document.getElementById('err-msg');err.textContent='';const num=parseFloat(document.getElementById('num-inp').value);const coef=parseFloat(document.getElementById('x-coef').value)||1;if(isNaN(num)&&!xMode){err.textContent='הכנס מספר תקין';return;}let xc=0,nc=0,effOp=op;if(xMode==='add'){xc=coef;nc=0;effOp='add';}else if(xMode==='sub'){xc=coef;nc=0;effOp='sub';}else{nc=num;}if((effOp==='div'||effOp==='mul')&&nc===0){err.textContent='ערך לא תקין';return;}const sym={add:'+',sub:'−',mul:'·',div:'÷'}[effOp];let lbl;if(xMode==='add')lbl=coef===1?'+x':'+'+coef+'x';else if(xMode==='sub')lbl=coef===1?'−x':'−'+coef+'x';else lbl=sym+r3(nc);function applyS(s){return{lx:r3(effOp==='add'?s.lx+xc:effOp==='sub'?s.lx-xc:effOp==='mul'?s.lx*nc:s.lx/nc),ln:r3(effOp==='add'?s.ln+nc:effOp==='sub'?s.ln-nc:effOp==='mul'?s.ln*nc:s.ln/nc),rx:r3(effOp==='add'?s.rx+xc:effOp==='sub'?s.rx-xc:effOp==='mul'?s.rx*nc:s.rx/nc),rn:r3(effOp==='add'?s.rn+nc:effOp==='sub'?s.rn-nc:effOp==='mul'?s.rn*nc:s.rn/nc)};}
const afterSt=applyS(st);animateApply({...st},afterSt,effOp,xc,nc,lbl,()=>{st=afterSt;log.push({op:lbl,eq:fmtEq(st)});xMode=null;document.getElementById('xadd-btn').classList.remove('on');document.getElementById('xsub-btn').classList.remove('on');busy=false;document.getElementById('exec-btn').disabled=false;if(isSolved2())eqs[ci].done=true;render();});}
function renderProgress(){const total=eqs.length,done=eqs.filter(e=>e.done).length,pct=total?Math.round(done/total*100):0;document.getElementById('prog-label').textContent=`פתרת ${done} תרגילים מתוך ${total}`;document.getElementById('prog-count').textContent=pct+'%';document.getElementById('prog-fill').style.width=pct+'%';document.getElementById('prog-dots').innerHTML=eqs.map((e,i)=>`<div class="prog-dot ${i===ci?'curr':e.done?'done':''}" title="${e.raw}" onclick="loadIdx(${i})"></div>`).join('');}
function render(){drawScale(st);const disp=document.getElementById('eq-disp');if(isSolved2()){disp.innerHTML=`<span style="color:#0C447C;background:#E6F1FB;border-radius:6px;padding:2px 14px">x = ${r3(st.rn)}</span>`;}else disp.textContent=fmtEq(st);const e2=eqs[ci];document.getElementById('eq-orig').textContent=(e2&&(e2.raw.includes('(')||e2.raw.includes('/')))?'משוואה מקורית: '+e2.raw:'';const guide=document.getElementById('eq-guide');if(!isSolved2()){if(st.ln!==0||st.rx!==0)guide.textContent='יש להביא למבנה: ax = b';else if(Math.abs(st.lx-1)>1e-9)guide.textContent='חלק במקדם של x לבידוד הנעלם';else guide.textContent='';}else guide.textContent='';const la=document.getElementById('log-area');if(!log.length)la.innerHTML='<div style="font-size:12px;color:var(--color-text-tertiary)">טרם בוצעו פעולות</div>';else la.innerHTML=log.map(e=>`<div class="log-entry"><span class="log-op">${e.op}</span><span class="log-eq">${e.eq}</span></div>`).join('');const lc=document.querySelector('.log-card');if(lc)lc.scrollTop=lc.scrollHeight;const banner=document.getElementById('solved-banner');if(isSolved2()){banner.textContent=`המשוואה נפתרה! x = ${r3(st.rn)}`;banner.classList.add('show');}else banner.classList.remove('show');renderProgress();renderEqList();updPreview();}
function renderEqList(){const ul=document.getElementById('eq-list');if(!ul)return;ul.innerHTML=eqs.map((e,i)=>`<div class="eq-row2${i===ci?' curr':e.done?' done2':''}" onclick="loadIdx(${i});hubTabByName('eq')"><span class="eq-num2">${i+1}</span><span class="eq-txt2">${e.raw}</span><span class="dot-b ${i===ci?'dot-c':e.done?'dot-d':'dot-t'}"></span></div>`).join('');}
function hubTabByName(t){document.querySelectorAll('.hub-tab').forEach((b,i)=>b.classList.toggle('active',['par','eq','exercises'][i]===t));document.querySelectorAll('.sim-panel').forEach(p=>p.classList.remove('active'));document.getElementById('hub-'+t).classList.add('active');if(t==='par')setTimeout(()=>{gRz();drawPar();},30);if(t==='eq')setTimeout(()=>{rz();drawScale(st);},30);}
function loadIdx(i){if(!eqs[i])return;ci=i;const e=eqs[i];st={lx:e.lx,ln:e.ln,rx:e.rx||0,rn:e.rn};log=[{op:'התחלה',eq:fmtEq(st)}];xMode=null;op='add';busy=false;document.getElementById('exec-btn').disabled=false;document.getElementById('err-msg').textContent='';document.getElementById('anim-bar').textContent='';document.getElementById('solved-banner').classList.remove('show');document.querySelectorAll('.op-btn').forEach(b=>b.classList.remove('sel'));document.getElementById('op-add').classList.add('sel');document.getElementById('xadd-btn').classList.remove('on');document.getElementById('xsub-btn').classList.remove('on');render();}
function resetCurr(){loadIdx(ci);}function nextEq(){loadIdx((ci+1)%eqs.length);}function resetAll(){eqs.forEach(e=>e.done=false);loadIdx(0);}
function addEq(){const inp=document.getElementById('add-inp'),err=document.getElementById('add-err'),raw=inp.value.trim();if(!raw)return;const p=parseEqStr(raw);if(!p){err.textContent='פורמט לא תקין';return;}err.textContent='';eqs.push({raw,...p,done:false});inp.value='';renderEqList();renderProgress();}
function hubTab(t,btn){document.querySelectorAll('.hub-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.sim-panel').forEach(p=>p.classList.remove('active'));document.getElementById('hub-'+t).classList.add('active');if(t==='par')setTimeout(()=>{gRz();updFormulaDisplay();drawPar();},30);if(t==='eq')setTimeout(()=>{rz();drawScale(st);},30);if(t==='exercises')renderEqList();}
window.addEventListener('resize',()=>{gRz();drawPar();if(!busy){rz();drawScale(st);}});
gRz();drawPar();loadIdx(0);
</script>
